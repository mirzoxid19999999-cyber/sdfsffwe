<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind Ism Show</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 h-screen flex items-center justify-center font-sans">

    <div class="bg-white/10 backdrop-blur-md border border-white/20 p-10 rounded-3xl shadow-2xl text-center max-w-sm w-full mx-4">
        
        <div class="mb-6">
            <div class="w-20 h-20 bg-indigo-500 rounded-full mx-auto flex items-center justify-center text-3xl shadow-lg shadow-indigo-500/50">
                👤
            </div>
        </div>

        <h1 class="text-gray-300 text-lg font-medium mb-2">Xush kelibsiz!</h1>
        
        <p id="displayName" class="text-4xl font-black bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">
            Mehmon
        </p>

        <hr class="my-6 border-white/10">

        <button onclick="changeName()" 
                class="w-full py-3 px-6 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl transition-all duration-300 transform hover:scale-105 active:scale-95 shadow-lg shadow-indigo-600/30">
            Ismni yangilash
        </button>
    </div>

    <script src="main.js">
    </script>
</body>
</html>
